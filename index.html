<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yesterday Admin — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <link rel="icon" type="image/svg+xml" href="assets/images/logo-mark.svg">
</head>

<body>

  <!-- ====================== Login screen ====================== -->
  <main class="auth-shell">
    <!-- Brand panel -->
    <aside class="auth-brand">
      <img class="logo-large" src="assets/images/logo.svg" alt="Yesterday logo">
      <div class="wordmark">Yesterday</div>
    </aside>

    <!-- Form panel -->
    <section class="auth-form-wrap">
      <form class="auth-form" id="loginForm" action="#" method="post" novalidate>
        <h1 class="auth-title">Welcome <span aria-hidden="true">👋</span></h1>

        <!-- Email -->
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input class="form-control" type="email" id="email" name="email" placeholder="yourname@gmail.com"
            autocomplete="email">
          <div class="field-error hidden" id="emailError">Invalid. Please try again</div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrap">
            <input class="form-control" type="password" id="password" name="password" autocomplete="current-password">
            <button type="button" class="input-icon-right" data-toggle-pass="password" aria-label="Show password">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M12 8.17001C14.1138 8.17006 15.8301 9.88626 15.8301 12.0001C15.83 14.1139 14.1138 15.8301 12 15.8302C9.88617 15.8302 8.16996 14.1139 8.16992 12.0001C8.16992 9.88623 9.88614 8.17001 12 8.17001ZM12 8.67001C10.1639 8.67001 8.66992 10.1639 8.66992 12.0001C8.66996 13.8362 10.1639 15.3302 12 15.3302C13.8361 15.3301 15.33 13.8362 15.3301 12.0001C15.3301 10.164 13.8361 8.67006 12 8.67001Z"
                  fill="#9FA4AC" stroke="#9FA4AC" />
                <path
                  d="M12.0001 21.02C8.24008 21.02 4.69008 18.82 2.25008 15C1.19008 13.35 1.19008 10.66 2.25008 9.00001C4.70008 5.18001 8.25008 2.98001 12.0001 2.98001C15.7501 2.98001 19.3001 5.18001 21.7401 9.00001C22.8001 10.65 22.8001 13.34 21.7401 15C19.3001 18.82 15.7501 21.02 12.0001 21.02ZM12.0001 4.48001C8.77008 4.48001 5.68008 6.42001 3.52008 9.81001C2.77008 10.98 2.77008 13.02 3.52008 14.19C5.68008 17.58 8.77008 19.52 12.0001 19.52C15.2301 19.52 18.3201 17.58 20.4801 14.19C21.2301 13.02 21.2301 10.98 20.4801 9.81001C18.3201 6.42001 15.2301 4.48001 12.0001 4.48001Z"
                  fill="#9FA4AC" />
              </svg>



            </button>
          </div>
        </div>

        <!-- Remember + forgot -->
        <div class="auth-row">
          <label class="checkbox">
            <input type="checkbox" name="remember" checked>
            <span class="box"></span>
            <span>Remember Me</span>
          </label>
          <a class="auth-link" href="forgot-password.html">Forgot Password ?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Sign In</button>
      </form>
    </section>
  </main>

  <script src="assets/js/main.js"></script>
  <script>
    // Login form behavior — validates email then redirects to the dashboard.
    (function () {
      var form = document.getElementById('loginForm');
      var emailField = document.getElementById('email');
      var emailError = document.getElementById('emailError');

      function showError(on) {
        if (on) {
          emailField.classList.add('has-error');
          emailError.classList.remove('hidden');
        } else {
          emailField.classList.remove('has-error');
          emailError.classList.add('hidden');
        }
      }

      if (form) {
        form.addEventListener('submit', function (e) {
          e.preventDefault();
          var val = (emailField.value || '').trim();
          var ok = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val);
          if (!ok) { showError(true); return; }
          showError(false);
          window.location.href = 'dashboard.html';
        });
        emailField.addEventListener('input', function () { showError(false); });
      }
    })();
  </script>
</body>

</html>
