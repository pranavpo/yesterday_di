          <h1 class="auth-title">Reset Password</h1>

          <div class="form-group login-form-group">
            <label class="form-label" for="newPassword">New Password</label>
            <div class="input-wrap">
              <input
                class="form-control"
                type="password"
                id="newPassword"
                name="newPassword"
                autocomplete="new-password"
                required
              />
              <button
                type="button"
                class="input-icon-right"
                data-toggle-pass="newPassword"
                aria-label="Show password"
              >
                <svg
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.6"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
            <div class="field-error hidden" id="newPasswordError">
              Please enter your new password.
            </div>
          </div>

          <div class="form-group login-form-group">
            <label class="form-label" for="confirmPassword"
              >Confirm New Password</label
            >
            <div class="input-wrap">
              <input
                class="form-control"
                type="password"
                id="confirmPassword"
                name="confirmPassword"
                autocomplete="new-password"
                required
              />
              <button
                type="button"
                class="input-icon-right"
                data-toggle-pass="confirmPassword"
                aria-label="Show password"
              >
                <svg
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.6"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
            <div class="field-error hidden" id="confirmPasswordError">
              Please enter your confirm password.
            </div>
          </div>

          <button
            type="submit"
            class="btn btn-primary btn-block"
            id="confirmPasswordBtn"
          >
            Confirm Password
          </button>
        </form>
      </section>
    </main>

    <!-- Success modal -->
    <div class="auth-overlay hidden" id="resetSuccess">
      <div class="auth-modal">
        <div class="check-icon">
          <svg
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="3"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="20 6 9 17 4 12" />
          </svg>
        </div>
        <h3>Password Reset</h3>
        <p>
          Your password has been updated. You can now log in using your new
          password.
        </p>
        <a href="index.html" class="btn btn-primary btn-block"
          >Go Back to Log In</a
        >
      </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script>
      (function () {
        var form = document.getElementById("resetForm");
        var modal = document.getElementById("resetSuccess");
        var newPassField = document.getElementById("newPassword");
        var newPassError = document.getElementById("newPasswordError");
        var confirmPassField = document.getElementById("confirmPassword");
        var confirmPassError = document.getElementById("confirmPasswordError");

        function showNewPassError(on, msg) {
          if (on) {
            newPassField.classList.add("has-error");
            newPassError.textContent = msg || "Please enter your new password.";
            newPassError.classList.remove("hidden");
          } else {
            newPassField.classList.remove("has-error");
            newPassError.classList.add("hidden");
          }
        }

        function showConfirmPassError(on, msg) {
          if (on) {
            confirmPassField.classList.add("has-error");
            confirmPassError.textContent =
              msg || "Please enter your confirm password.";
            confirmPassError.classList.remove("hidden");
          } else {
            confirmPassField.classList.remove("has-error");
            confirmPassError.classList.add("hidden");
          }
        }

        if (form && modal) {
          form.addEventListener("submit", function (e) {
            e.preventDefault();
            var newVal = newPassField.value || "";
            var confirmVal = confirmPassField.value || "";
            var valid = true;

            if (!newVal) {
              showNewPassError(true, "Please enter your new password.");
              valid = false;
            } else {
              showNewPassError(false);
            }

            if (!confirmVal) {
              showConfirmPassError(true, "Please enter your confirm password.");
              valid = false;
            } else if (newVal && confirmVal !== newVal) {
              showConfirmPassError(true, "Passwords do not match.");
              valid = false;
            } else {
              showConfirmPassError(false);
            }

            if (!valid) return;
            modal.classList.remove("hidden");
          });

          newPassField.addEventListener("input", function () {
            showNewPassError(false);
          });

          confirmPassField.addEventListener("input", function () {
            showConfirmPassError(false);
          });
        }
