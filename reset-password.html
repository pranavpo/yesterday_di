<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yesterday Admin — Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <link rel="icon" type="image/svg+xml" href="assets/images/logo-mark.svg">
</head>
<body>

<main class="auth-shell">
  <aside class="auth-brand">
    <img class="logo-large" src="assets/images/logo.svg" alt="Yesterday logo">
    <div class="wordmark">Yesterday</div>
  </aside>

  <section class="auth-form-wrap">
    <form class="auth-form" id="resetForm" action="#" method="post" novalidate>
      <a class="auth-back" href="verify-code.html">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        Back
      </a>

      <h1 class="auth-title">Reset Password</h1>

      <div class="form-group">
        <label class="form-label" for="newPassword">New Password</label>
        <div class="input-wrap">
          <input class="form-control" type="password" id="newPassword" name="newPassword" autocomplete="new-password" required>
          <button type="button" class="input-icon-right" data-toggle-pass="newPassword" aria-label="Show password">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirmPassword">Confirm New Password</label>
        <div class="input-wrap">
          <input class="form-control" type="password" id="confirmPassword" name="confirmPassword" autocomplete="new-password" required>
          <button type="button" class="input-icon-right" data-toggle-pass="confirmPassword" aria-label="Show password">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block" id="confirmPasswordBtn">Confirm Password</button>
    </form>
  </section>
</main>

<!-- Success modal -->
<div class="auth-overlay hidden" id="resetSuccess">
  <div class="auth-modal">
    <div class="check-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h3>Password Reset</h3>
    <p>Your password has been updated. You can now log in using your new password.</p>
    <a href="index.html" class="btn btn-primary btn-block">Go Back to Log In</a>
  </div>
</div>

<script src="assets/js/main.js"></script>
<script>
  // Show success modal on form submit
  (function () {
    var form = document.getElementById('resetForm');
    var modal = document.getElementById('resetSuccess');
    if (form && modal) {
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        modal.classList.remove('hidden');
      });
    }
  })();
</script>
</body>
</html>
