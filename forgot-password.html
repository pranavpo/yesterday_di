<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yesterday Admin — Forgot Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <link rel="icon" type="image/svg+xml" href="assets/images/logo-mark.svg">
</head>
<body>

<main class="auth-shell">
  <aside class="auth-brand">
    <img class="logo-large" src="assets/images/logo.svg" alt="Yesterday logo">
    <div class="wordmark">Yesterday</div>
  </aside>

  <section class="auth-form-wrap">
    <form class="auth-form" id="forgotForm" action="./verify-code.html" method="get" novalidate>
      <a class="auth-back" href="index.html">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        Back
      </a>

      <h1 class="auth-title">Forgot Password</h1>
      <p class="auth-subtitle">Enter your email address to reset your password.<br>We'll send you a verification code to proceed.</p>

      <div class="form-group login-form-group">
        <label class="form-label" for="email">Email</label>
        <input class="form-control" type="email" id="email" name="email" placeholder="yourname@gmail.com" autocomplete="email" required>
      </div>

      <button type="submit" class="btn btn-primary btn-block">Send Verification Code</button>
    </form>
  </section>
</main>

<script src="assets/js/main.js"></script>
</body>
</html>
